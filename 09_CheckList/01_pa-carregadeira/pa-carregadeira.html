<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklists - Pá Carregadeira</title>

    <link rel="stylesheet" href="./css/pa-carregadeira.css" />
    <link rel="icon" type="image/png" href="../../01_HOME/img/Logo_AGM.png" />
  </head>

  <body>
    <main class="container">
      <header class="topo">
        <div>
          <span>SMS • CHECKLIST</span>
          <h1>Pá Carregadeira</h1>
          <p>Checklists recebidos dos operadores</p>
        </div>

        <a href="../index.html" class="btn-voltar">Voltar</a>
      </header>

      <section class="resumo">
        <div class="card-resumo">
          <h3>Total</h3>
          <strong id="totalChecklists">0</strong>
        </div>

        <div class="card-resumo alerta">
          <h3>Com NC</h3>
          <strong id="totalNC">0</strong>
        </div>

        <div class="card-resumo ok">
          <h3>Conformes</h3>
          <strong id="totalConformes">0</strong>
        </div>
      </section>

      <section class="filtros">
        <input type="text" id="buscar" placeholder="Buscar por operador, modelo ou data..." />

        <select id="filtroStatus">
          <option value="">Todos</option>
          <option value="com-nc">Com não conformidade</option>
          <option value="conforme">Sem não conformidade</option>
        </select>
      </section>

      <section id="listaChecklists" class="lista"></section>
    </main>

    <div id="modalDetalhes" class="modal">
      <div class="modal-content">
        <button id="fecharModal" class="fechar">×</button>
        <div id="conteudoModal"></div>
      </div>
    </div>

    <script type="module" src="./js/pa-carregadeira.js"></script>
  </body>
</html>
